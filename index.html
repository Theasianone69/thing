function launch(name, url) {
    const content = `
        <!DOCTYPE html>
        <html>
        <head>
            <title>about:blank</title>
            <style>
                body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                iframe { border: none; width: 100%; height: 100%; }
            </style>
        </head>
        <body>
            <iframe src="${url}"></iframe>
            <script>
                // 1. The main shield
                window.onbeforeunload = function() { return "Shield Active"; };

                // 2. The 'interval' shield (in case the extension tries to reset it)
                setInterval(() => {
                    window.onbeforeunload = function() { return "Shield Active"; };
                }, 500);

                // 3. Panic Key Q
                window.addEventListener('keydown', function(e) {
                    if (e.key.toLowerCase() === 'q') {
                        window.onbeforeunload = null; 
                        window.location.href = 'https://classroom.google.com';
                    }
                });
            <\/script>
        </body>
        </html>`;

    // Using Blob URL instead of document.write for better bypass
    const blob = new Blob([content], {type: 'text/html'});
    const blobUrl = URL.createObjectURL(blob);
    
    const newTab = window.open('about:blank', '_blank');
    if (newTab) {
        newTab.location.href = blobUrl;
    } else {
        alert('Popup blocked!');
    }
}
