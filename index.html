<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about:blank</title>
    
    <link rel="icon" type="image/png" href="https://schoolissuperfun.github.io/logo.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- PANIC BANNER --- */
        .panic-banner {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 5px 0;
            font-size: 0.9vw;
            font-weight: 600;
            z-index: 9999;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 2fr; 
            height: 100vh;
            width: 100vw;
            gap: 15px; 
            padding: 40px 15px 15px 15px;
        }

        .nav-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            text-decoration: none;
            outline: none;
            overflow: hidden;
            font-size: 2.5vw; 
        }

        .games-main-btn {
            grid-column: 1;
            grid-row: 1;
            background: linear-gradient(135deg, #007cf0, #00dfd8);
            border-radius: 40px 15px 10px 15px;
        }

        .games-req-btn {
            grid-column: 1;
            grid-row: 2;
            background: linear-gradient(225deg, #4facfe, #00f2fe);
            border-radius: 10px 15px 40px 15px;
        }

        .proxies-btn {
            grid-column: 2;
            grid-row: 1 / span 2;
            background: linear-gradient(225deg, #ff4b2b, #ff416c);
            border-radius: 15px 40px 15px 40px;
            font-size: 3.5vw;
        }

        .tools-btn {
            grid-column: 1;
            grid-row: 3;
            background: linear-gradient(135deg, #7928ca, #ff0080);
            border-radius: 40px 15px 40px 15px;
        }

        .news-btn {
            grid-column: 2;
            grid-row: 3;
            background: #111; 
            border: 2px solid #333;
            border-radius: 15px 40px 15px 40px;
            padding: 20px;
            cursor: default;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .news-header {
            color: #4facfe;
            font-size: 1.5vw;
            margin-bottom: 8px;
            font-weight: 900;
            letter-spacing: 1px;
            flex-shrink: 0;
            background: #111;
            text-align: left;
            width: 100%;
        }

        .news-header a {
            color: #ff416c;
            text-decoration: underline;
            cursor: pointer;
        }

        .news-scroll-area {
            overflow-y: auto;
            flex-grow: 1;
            width: 100%;
        }

        .news-text {
            text-transform: none; 
            font-weight: 400;
            font-size: 1.2vw;
            color: #ccc;
            line-height: 1.1; 
            white-space: normal;
            text-align: left;
        }

        .news-scroll-area::-webkit-scrollbar { width: 6px; }
        .news-scroll-area::-webkit-scrollbar-track { background: transparent; }
        .news-scroll-area::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        .news-scroll-area::-webkit-scrollbar-thumb:hover { background: #4facfe; }

        .nav-btn:not(.news-btn):hover {
            filter: brightness(1.2);
            transform: scale(1.01);
            z-index: 10;
        }

        span { filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); pointer-events: none; padding: 10px; }

        .sub-text {
            font-size: 1.1vw;
            font-weight: 600;
            text-transform: none;
            display: block;
            margin-top: 5px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="panic-banner">Teacher-Proof Mode Enabled: Type inside the tab once to arm. Press 'Q' to Panic.</div>

    <div class="container">
        <button class="nav-btn games-main-btn" onclick="launch('Main Games', 'https://games-4cz.pages.dev')">
            <span>Main Games</span>
        </button>

        <button class="nav-btn games-req-btn" onclick="launch('Requested Games', 'https://requested-games-4jg.pages.dev')">
            <span>Requested Games<br><span class="sub-text">Games In News, Game Websites</span></span>
        </button>

        <button class="nav-btn proxies-btn" onclick="launch('Proxies', 'https://proxies-6x8.pages.dev')">
            <span>Proxies</span>
        </button>

        <button class="nav-btn tools-btn" onclick="launch('Movies & Tools', 'https://movies-tools.pages.dev')">
            <span>Movies and Tools</span>
        </button>

        <div class="nav-btn news-btn">
            <div class="news-header">
                NEWS (PLEASE USE <a href="https://forms.gle/1PK3AMXTvXjHnrdq8" target="_blank" rel="noopener noreferrer">REQUEST FORM</a>)
            </div>
            
            <div class="news-scroll-area">
                <div class="news-text">
                    2/27/26: Blob URL Protocols Integrated.<br>
                    2/18/26: Scramjet is live on Render.<br>
                    1/21/26: Shield Armed for Teacher Close Commands.
                </div>
            </div>
        </div>
    </div>

    <script>
        function launch(name, url) {
            // Updated content with specific modern Chrome triggers
            const content = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>about:blank</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                        iframe { border: none; width: 100%; height: 100%; position: absolute; z-index: 2; }
                        #shield { position: absolute; top:0; left:0; width:1px; height:1px; opacity:0; z-index: 1; }
                    </style>
                </head>
                <body>
                    <input type="text" id="shield" value="active">
                    <iframe src="${url}"></iframe>

                    <script>
                        // Step 1: Force an interaction focus
                        document.getElementById('shield').focus();

                        // Step 2: The Modern Anti-Close Script
                        window.onbeforeunload = function(e) {
                            // Chrome needs both of these to trigger the prompt
                            e.preventDefault();
                            e.returnValue = 'SHIELD_ACTIVE'; 
                            return 'SHIELD_ACTIVE';
                        };

                        // Step 3: Re-arm shield every 200ms
                        setInterval(() => {
                            if (!window.onbeforeunload) {
                                window.onbeforeunload = function(e) {
                                    e.preventDefault();
                                    e.returnValue = 'SHIELD_ACTIVE';
                                    return 'SHIELD_ACTIVE';
                                };
                            }
                        }, 200);

                        // Step 4: Panic Key 'Q'
                        window.addEventListener('keydown', function(e) {
                            if (e.key.toLowerCase() === 'q') {
                                window.onbeforeunload = null; 
                                window.location.replace('https://classroom.google.com');
                            }
                        });
                    <\/script>
                </body>
                </html>`;

            // Step 1: Create Blob (Bypasses Cloudflare CSP)
            const blob = new Blob([content], { type: 'text/html' });
            const blobUrl = URL.createObjectURL(blob);

            // Step 2: Open and Redirect
            const newTab = window.open('about:blank', '_blank');
            if (newTab) {
                newTab.location.href = blobUrl;
            } else {
                alert('Popup blocked! Please allow popups.');
            }
        }

        // Global Panic Key for main hub
        window.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'q') {
                window.location.href = 'https://classroom.google.com';
            }
        });
    </script>
</body>
</html>
