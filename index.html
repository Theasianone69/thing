<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>about:blank</title>
    
    <link rel="icon" type="image/png" href="https://schoolissuperfun.github.io/logo.png">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { height: 100%; width: 100%; background: #000; font-family: 'Inter', sans-serif; overflow: hidden; }

        /* --- PANIC BANNER --- */
        .panic-banner {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: rgba(255, 255, 255, 0.6);
            text-align: center;
            padding: 5px 0;
            font-size: 0.9vw;
            font-weight: 600;
            z-index: 9999;
            letter-spacing: 1px;
            text-transform: uppercase;
            pointer-events: none;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr 2fr; 
            height: 100vh;
            width: 100vw;
            gap: 15px; 
            padding: 40px 15px 15px 15px;
        }

        .nav-btn {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.3s ease, filter 0.3s ease;
            outline: none;
            font-size: 2.5vw; 
        }

        .games-main-btn { grid-column: 1; grid-row: 1; background: linear-gradient(135deg, #007cf0, #00dfd8); border-radius: 40px 15px 10px 15px; }
        .games-req-btn { grid-column: 1; grid-row: 2; background: linear-gradient(225deg, #4facfe, #00f2fe); border-radius: 10px 15px 40px 15px; }
        .proxies-btn { grid-column: 2; grid-row: 1 / span 2; background: linear-gradient(225deg, #ff4b2b, #ff416c); border-radius: 15px 40px 15px 40px; font-size: 3.5vw; }
        .tools-btn { grid-column: 1; grid-row: 3; background: linear-gradient(135deg, #7928ca, #ff0080); border-radius: 40px 15px 40px 15px; }

        .news-btn {
            grid-column: 2; grid-row: 3;
            background: #111; border: 2px solid #333;
            border-radius: 15px 40px 15px 40px;
            padding: 20px; cursor: default;
            display: flex; flex-direction: column; overflow: hidden;
        }

        .news-header { color: #4facfe; font-size: 1.5vw; margin-bottom: 8px; font-weight: 900; }
        .news-text { font-size: 1.2vw; color: #ccc; line-height: 1.1; text-align: left; }

        /* --- MODAL STYLES --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 10000;
            align-items: center;
            justify-content: center;
        }

        .modal {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #4facfe;
            text-align: center;
            width: 400px;
        }

        .modal h2 { color: white; margin-bottom: 20px; font-size: 1.5rem; }

        .modal-btn {
            display: block;
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .btn-blank { background: #4facfe; color: black; }
        .btn-blob { background: #ff416c; color: white; }
        .btn-cancel { background: #333; color: white; margin-top: 20px; }
        .modal-btn:hover { transform: scale(1.05); filter: brightness(1.2); }

    </style>
</head>
<body>

    <div class="panic-banner">Select your cloaking method. Reminder: In Blob Url mode you must interact with the opened page to start the shield</div>

    <div id="modal-overlay">
        <div class="modal">
            <h2 id="modal-title">Select Launch Method</h2>
            <button class="modal-btn btn-blank" id="choice-blank">Open in about:blank(No-History)</button>
            <button class="modal-btn btn-blob" id="choice-blob">Open as Blob URL (Shielded & Relodable)</button>
            <button class="modal-btn btn-cancel" onclick="closeModal()">Cancel</button>
        </div>
    </div>

    <div class="container">
        <button class="nav-btn games-main-btn" onclick="openChoice('Main Games', 'https://games-4cz.pages.dev')">
            <span>Main Games</span>
        </button>

        <button class="nav-btn games-req-btn" onclick="openChoice('Requested Games', 'https://requested-games-4jg.pages.dev')">
            <span>Requested Games</span>
        </button>

        <button class="nav-btn proxies-btn" onclick="openChoice('Proxies', 'https://proxies-6x8.pages.dev')">
            <span>Proxies</span>
        </button>

        <button class="nav-btn tools-btn" onclick="openChoice('Movies & Tools', 'https://movies-tools.pages.dev')">
            <span>Movies and Tools</span>
        </button>

        <div class="nav-btn news-btn">
            <div class="news-header">NEWS</div>
            <div class="news-text">
                3/10/26: Added Choice Selection! Use Blob URL for teacher-protection or about:blank for history hiding.
            </div>
        </div>
    </div>

    <script>
        let currentName = '';
        let currentUrl = '';

        function openChoice(name, url) {
            currentName = name;
            currentUrl = url;
            document.getElementById('modal-title').innerText = "Launch " + name;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        document.getElementById('choice-blank').onclick = function() {
            launch(currentName, currentUrl, 'blank');
            closeModal();
        };

        document.getElementById('choice-blob').onclick = function() {
            launch(currentName, currentUrl, 'blob');
            closeModal();
        };

        function launch(name, url, mode) {
            const content = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>about:blank</title>
                    <style>
                        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #000; }
                        iframe { border: none; width: 100%; height: 100%; position: absolute; z-index: 2; }
                        #shield { position: absolute; top:0; left:0; width:1px; height:1px; opacity:0; z-index: 1; }
                    </style>
                </head>
                <body>
                    <input type="text" id="shield" value="active">
                    <iframe src="${url}"></iframe>
                    <script>
                        document.getElementById('shield').focus();
                        window.onbeforeunload = function(e) {
                            e.preventDefault();
                            e.returnValue = 'SHIELD_ACTIVE'; 
                            return 'SHIELD_ACTIVE';
                        };
                        setInterval(() => {
                            if (!window.onbeforeunload) {
                                window.onbeforeunload = function(e) {
                                    e.preventDefault(); e.returnValue = 'SHIELD_ACTIVE'; return 'SHIELD_ACTIVE';
                                };
                            }
                        }, 200);
                        window.addEventListener('keydown', function(e) {
                            if (e.key.toLowerCase() === 'q') {
                                window.onbeforeunload = null; 
                                window.location.replace('https://classroom.google.com');
                            }
                        });
                    <\/script>
                </body>
                </html>`;

            if (mode === 'blob') {
                const blob = new Blob([content], { type: 'text/html' });
                const blobUrl = URL.createObjectURL(blob);
                const newTab = window.open('about:blank', '_blank');
                if (newTab) newTab.location.href = blobUrl;
            } else {
                const newTab = window.open('about:blank', '_blank');
                if (newTab) {
                    newTab.document.open();
                    newTab.document.write(content);
                    newTab.document.close();
                }
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key.toLowerCase() === 'q') window.location.href = 'https://classroom.google.com';
        });
    </script>
</body>
</html>
